<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Google Blue gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6FA8F3"/>
      <stop offset="100%" stop-color="#4285F4"/>
    </linearGradient>
    <!-- Pin shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background circle with subtle gradient -->
  <circle cx="32" cy="32" r="30" fill="url(#blueGrad)"/>
  
  <!-- White border ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Location pin shape - improved path for smoother curve -->
  <path d="M32 14c-10.5 0-19 8.5-19 19 0 14.5 19 27 19 27s19-12.5 19-27c0-10.5-8.5-19-19-19z" fill="#fff" filter="url(#shadow)"/>
  
  <!-- Inner circle with Google blue -->
  <circle cx="32" cy="33" r="8" fill="#4285F4"/>
  
  <!-- Center dot with subtle highlight -->
  <circle cx="32" cy="33" r="4" fill="#fff"/>
  
  <!-- Subtle highlight on pin top -->
  <ellipse cx="32" cy="18" rx="6" ry="3" fill="#fff" opacity="0.4"/>
</svg>
